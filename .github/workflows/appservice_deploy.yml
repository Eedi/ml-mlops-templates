name: App Service - Deploy

# Reusable workflow: point an Azure App Service (containers) at an image tag in
# ACR, using the OIDC federated service principal. By default the App Service
# pulls from ACR with its own managed identity (no registry password anywhere);
# set use_managed_identity: false to fall back to ACR admin creds. 
#
# Call it from a project repo with:
#   uses: Eedi/ml-mlops-templates/.github/workflows/appservice_deploy.yml@vX.Y.Z
#   secrets: inherit
#   permissions:
#     id-token: write
#     contents: read

on:
  workflow_call:
    inputs:
      app_label:
        description: 'Human-friendly app name used in Slack messages (e.g. "ml-atoms").'
        required: true
        type: string
      webapp_name:
        description: 'Azure App Service (web app) name.'
        required: true
        type: string
      resource_group:
        description: 'Azure resource group containing the App Service.'
        required: true
        type: string
      image_repository:
        description: 'ACR repository name (e.g. "ml-atoms").'
        required: true
        type: string
      image_tag:
        description: 'Image tag to deploy (e.g. dev_latest, dev_buildid_123).'
        required: true
        type: string
      environment:
        description: 'GitHub environment name (for approvals/secrets). Empty = none.'
        required: false
        type: string
        default: ''
      websites_port:
        description: 'Container port App Service should route to.'
        required: false
        type: string
        default: '8000'
      use_managed_identity:
        description: 'Pull from ACR using the web app managed identity (recommended). If false, uses ACR_USERNAME/ACR_PASSWORD.'
        required: false
        type: boolean
        default: true
      extra_app_settings:
        description: 'Optional extra app settings, space-delimited KEY=VALUE pairs.'
        required: false
        type: string
        default: ''
      runs_on:
        description: 'Runner label.'
        required: false
        type: string
        default: 'ubuntu-latest'
    secrets:
      ARM_CLIENT_ID:
        required: true
      ARM_TENANT_ID:
        required: true
      ARM_SUBSCRIPTION_ID:
        required: true
      ACR_LOGIN_SERVER:
        required: true
      ACR_USERNAME:
        required: false
      ACR_PASSWORD:
        required: false
      SLACK_DEPLOYS_WEBHOOK_URL:
        required: false

jobs:
  deploy:
    name: Deploy ${{ inputs.app_label }}
    runs-on: ${{ inputs.runs_on }}
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    env:
      ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
      ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
      ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
      SLACK_DEPLOYS_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOYS_WEBHOOK_URL }}
      IMAGE: ${{ secrets.ACR_LOGIN_SERVER }}/${{ inputs.image_repository }}:${{ inputs.image_tag }}
    steps:
      - name: Az CLI Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Configure app settings
        run: |
          az webapp config appsettings set \
            --name "${{ inputs.webapp_name }}" \
            --resource-group "${{ inputs.resource_group }}" \
            --settings WEBSITES_PORT=${{ inputs.websites_port }} ${{ inputs.extra_app_settings }}

      - name: Set container image
        run: |
          if [ "${{ inputs.use_managed_identity }}" = "true" ]; then
            az webapp config container set \
              --name "${{ inputs.webapp_name }}" \
              --resource-group "${{ inputs.resource_group }}" \
              --docker-custom-image-name "$IMAGE" \
              --docker-registry-server-url "https://${ACR_LOGIN_SERVER}"
            WEBAPP_ID=$(az webapp show --name "${{ inputs.webapp_name }}" --resource-group "${{ inputs.resource_group }}" --query id -o tsv)
            az resource update --ids "${WEBAPP_ID}/config/web" --set properties.acrUseManagedIdentityCreds=true
          else
            az webapp config container set \
              --name "${{ inputs.webapp_name }}" \
              --resource-group "${{ inputs.resource_group }}" \
              --docker-custom-image-name "$IMAGE" \
              --docker-registry-server-url "https://${ACR_LOGIN_SERVER}" \
              --docker-registry-server-user "$ACR_USERNAME" \
              --docker-registry-server-password "$ACR_PASSWORD"
          fi

      - name: Restart App Service
        run: |
          az webapp restart \
            --name "${{ inputs.webapp_name }}" \
            --resource-group "${{ inputs.resource_group }}"

      - name: Notify Slack - Success
        if: success() && env.SLACK_DEPLOYS_WEBHOOK_URL != ''
        run: |
          PAYLOAD=$(cat <<EOF
          {
            "attachments": [
              {
                "color": "good",
                "text": "🚀 ${{ inputs.app_label }} - Deployed\n> Environment: ${{ inputs.environment }}\n> App: ${{ inputs.webapp_name }}\n> Image: ${IMAGE}\n> Deployed by: ${{ github.actor }}\n> Status: ✅ Live"
              }
            ]
          }
          EOF
          )
          curl -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$SLACK_DEPLOYS_WEBHOOK_URL"

      - name: Notify Slack - Failure
        if: failure() && env.SLACK_DEPLOYS_WEBHOOK_URL != ''
        run: |
          PAYLOAD=$(cat <<EOF
          {
            "attachments": [
              {
                "color": "danger",
                "text": "❌ ${{ inputs.app_label }} - Deployment Failed\n> Environment: ${{ inputs.environment }}\n> App: ${{ inputs.webapp_name }}\n> Image: ${IMAGE}\n> Triggered by: ${{ github.actor }}\n> Status: ❌ Failed"
              }
            ]
          }
          EOF
          )
          curl -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$SLACK_DEPLOYS_WEBHOOK_URL"
